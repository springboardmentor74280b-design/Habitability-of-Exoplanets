<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exoplanet Habitability Prediction</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    color:white;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:40px 0;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    font-size:3rem;
    margin-bottom:10px;
}

.header p{
    color:#cbd5e1;
    font-size:18px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:30px;
    box-shadow:0 8px 30px rgba(0,0,0,.3);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.input-box{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:8px;
    color:#cbd5e1;
}

input{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    font-size:16px;
}

input:focus{
    outline:none;
    border:2px solid #3b82f6;
}

.predict-btn{
    width:100%;
    margin-top:30px;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    color:white;
    cursor:pointer;
    transition:.3s;
}

.predict-btn:hover{
    transform:translateY(-3px);
}

.result{
    margin-top:30px;
    display:none;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.metric{
    background:#0f172a;
    border-radius:15px;
    padding:20px;
    text-align:center;
}

.metric h2{
    font-size:2rem;
    color:#22c55e;
}

.metric p{
    color:#cbd5e1;
}

.status{
    background:#14532d;
    padding:20px;
    border-radius:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.summary{
    margin-top:20px;
    background:#0f172a;
    padding:20px;
    border-radius:15px;
}

.summary h3{
    margin-bottom:10px;
}

.summary p{
    margin:8px 0;
}

</style>

</head>

<body>

<div class="container">

```
<div class="header">
    <h1>🌍 Exoplanet Habitability Predictor</h1>
    <p>AI-Powered Planetary Life Assessment System</p>
</div>

<div class="card">

    <div class="grid">

        <div class="input-box">
            <label>Planet Radius (Earth Radius)</label>
            <input type="number" id="radius" value="1.0">
        </div>

        <div class="input-box">
            <label>Planet Mass (Earth Mass)</label>
            <input type="number" id="mass" value="1.0">
        </div>

        <div class="input-box">
            <label>Orbital Period (Days)</label>
            <input type="number" id="period" value="365">
        </div>

        <div class="input-box">
            <label>Star Temperature (Kelvin)</label>
            <input type="number" id="temp" value="5778">
        </div>

        <div class="input-box">
            <label>Star Luminosity</label>
            <input type="number" id="lum" value="1.0">
        </div>

    </div>

    <button class="predict-btn" onclick="predictHabitability()">
        🔍 Predict Habitability
    </button>

    <div class="result" id="resultSection">

        <div class="metric">
            <h2 id="score">87%</h2>
            <p>Habitability Score</p>
        </div>

        <div class="metric">
            <h2>95%</h2>
            <p>Model Confidence</p>
        </div>

        <div class="status">
            ✅ Potentially Habitable Planet
        </div>

    </div>

    <div class="summary" id="summary" style="display:none;">
        <h3>Planet Summary</h3>

        <p id="s1"></p>
        <p id="s2"></p>
        <p id="s3"></p>
        <p id="s4"></p>
        <p id="s5"></p>

    </div>

</div>
```

</div>

<script>

function predictHabitability(){

    let radius = document.getElementById("radius").value;
    let mass = document.getElementById("mass").value;
    let period = document.getElementById("period").value;
    let temp = document.getElementById("temp").value;
    let lum = document.getElementById("lum").value;

    document.getElementById("resultSection").style.display="grid";
    document.getElementById("summary").style.display="block";

    document.getElementById("s1").innerHTML="🌎 Planet Radius: " + radius;
    document.getElementById("s2").innerHTML="🪐 Planet Mass: " + mass;
    document.getElementById("s3").innerHTML="🔄 Orbital Period: " + period + " Days";
    document.getElementById("s4").innerHTML="🔥 Star Temperature: " + temp + " K";
    document.getElementById("s5").innerHTML="✨ Star Luminosity: " + lum;
}

</script>

</body>
</html>
